<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta name="theme-color" content="#b67a2a">

    <meta property="og:title" content="Columbia Foundry">
    <meta property="og:description" content="Forging software, games, and digital products.">
    <meta property="og:image" content="https://columbiafoundry.com/columbia-foundry-logo.png">
    <meta property="og:url" content="https://columbiafoundry.com">
    <meta property="og:type" content="website">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Columbia Foundry">
    <meta name="twitter:description" content="Forging software, games, and digital products.">
    <meta name="twitter:image" content="https://columbiafoundry.com/columbia-foundry-logo.png">

    <title>Columbia Foundry</title>
    <style>
        :root {
            --bg: #070707;
            --panel: #101010;
            --panel-2: #17120d;
            --gold: #d59a3a;
            --gold-bright: #f4cc79;
            --gold-deep: #8b5a18;
            --ember: #ff8a00;
            --ember-soft: rgba(255, 138, 0, 0.2);
            --text: #f4ead7;
            --muted: #c4b08c;
            --line: rgba(213, 154, 58, 0.28);
            --shadow: rgba(0, 0, 0, 0.55);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            background:
                radial-gradient(circle at top, rgba(255, 166, 0, 0.14), transparent 32%),
                radial-gradient(circle at bottom, rgba(213, 154, 58, 0.08), transparent 28%),
                linear-gradient(180deg, #040404 0%, #090909 45%, #050505 100%);
            color: var(--text);
            font-family: Georgia, "Times New Roman", serif;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 18px;
        }

        .page-frame {
            width: min(100%, 980px);
            border: 1px solid var(--line);
            background:
                linear-gradient(180deg, rgba(18, 18, 18, 0.96), rgba(10, 10, 10, 0.98)),
                var(--panel);
            box-shadow:
                0 0 0 2px rgba(90, 60, 20, 0.18),
                0 28px 80px var(--shadow),
                inset 0 0 60px rgba(255, 166, 0, 0.03);
            position: relative;
            overflow: hidden;
        }

        .page-frame::before,
        .page-frame::after {
            content: "";
            position: absolute;
            inset: 18px;
            border: 1px solid rgba(244, 204, 121, 0.12);
            pointer-events: none;
        }

        .page-frame::after {
            inset: 30px;
            border-color: rgba(213, 154, 58, 0.08);
        }

        .hero {
            position: relative;
            padding: 72px 28px 56px;
            text-align: center;
            overflow: hidden;
        }

        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(135deg, transparent 0 24%, rgba(213, 154, 58, 0.06) 24% 26%, transparent 26% 74%, rgba(213, 154, 58, 0.05) 74% 76%, transparent 76%),
                linear-gradient(0deg, rgba(255, 255, 255, 0.015), rgba(255, 255, 255, 0));
            pointer-events: none;
        }

        .crest-line {
            width: min(420px, 78vw);
            height: 2px;
            margin: 0 auto 28px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            box-shadow: 0 0 18px rgba(244, 204, 121, 0.35);
        }

        .logo-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 22px;
            border: 1px solid rgba(213, 154, 58, 0.22);
            background: radial-gradient(circle at center, rgba(255, 166, 0, 0.12), rgba(0, 0, 0, 0) 62%);
            box-shadow:
                inset 0 0 32px rgba(255, 166, 0, 0.08),
                0 0 28px rgba(255, 138, 0, 0.08);
        }

        .logo-wrap::before {
            content: "";
            position: absolute;
            inset: 10px;
            border: 1px solid rgba(244, 204, 121, 0.15);
            pointer-events: none;
        }

        .logo {
            display: block;
            width: min(100%, 430px);
            max-width: 78vw;
            height: auto;
            filter: drop-shadow(0 10px 28px rgba(0, 0, 0, 0.55));
        }

        h1 {
            margin: 34px 0 10px;
            font-size: clamp(2.4rem, 6vw, 4.75rem);
            line-height: 0.95;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: var(--gold-bright);
            text-shadow:
                0 2px 0 rgba(80, 46, 8, 0.9),
                0 0 22px rgba(244, 204, 121, 0.12);
        }

        .subtitle {
            margin: 0 auto;
            max-width: 700px;
            font-size: clamp(1rem, 2vw, 1.2rem);
            line-height: 1.75;
            color: var(--muted);
            letter-spacing: 0.03em;
        }

        .content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            padding: 0 28px 40px;
        }

        .panel {
            position: relative;
            padding: 24px 20px;
            border: 1px solid var(--line);
            background:
                linear-gradient(180deg, rgba(30, 20, 10, 0.42), rgba(12, 12, 12, 0.88));
            box-shadow: inset 0 0 24px rgba(255, 166, 0, 0.03);
        }

        .panel::before {
            content: "";
            position: absolute;
            top: 0;
            left: 18px;
            right: 18px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(244, 204, 121, 0.55), transparent);
        }

        h2 {
            margin: 0 0 12px;
            font-size: 0.95rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--gold-bright);
        }

        p {
            margin: 0;
            line-height: 1.7;
            color: var(--text);
        }

        .footer {
            padding: 0 28px 34px;
            text-align: center;
        }

        .footer a {
            color: var(--gold-bright);
            text-decoration: none;
            border-bottom: 1px solid rgba(244, 204, 121, 0.35);
        }

        .footer a:hover {
            color: #fff4d7;
            border-bottom-color: rgba(255, 244, 215, 0.55);
        }

        @media (max-width: 700px) {
            .hero {
                padding-top: 52px;
            }

            .content,
            .footer {
                padding-left: 18px;
                padding-right: 18px;
            }
        }
    </style>
</head>

<body>
    <main class="page-frame">
        <section class="hero">
            <div class="crest-line"></div>

            <div class="logo-wrap">
                <img class="logo" src="./columbia-foundry-logo.png" alt="Columbia Foundry brand logo" />
            </div>

            <p class="subtitle">
                Forging software, games, and digital products with craftsmanship.
            </p>
        </section>

        <section class="content">
            <article class="panel">
                <h2>What We Build</h2>
                <p>
                    Columbia Foundry creates fun games.
                </p>
            </article>

            <article class="panel">
                <h2>Current Focus</h2>
                <p>
                    Shipping great games.
                </p>
            </article>

            <article class="panel">
                <h2>Contact</h2>
                <p>
                    hello@columbiafoundry.com<br />
                    Seattle, Washington
                </p>
            </article>
        </section>

        <footer class="footer">
            <p>
                © 2026 Columbia Foundry. All rights reserved.
            </p>
        </footer>
    </main>
</body>

</html>
